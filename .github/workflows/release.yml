name: Release

# On a v* tag: generate the changelog from the gitmoji history (git-cliff + cliff.toml),
# publish a GitHub release, and attach cross-OS observer binaries. The observer image is
# built/pushed by docker-publish.yml, which also triggers on v* tags.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create/update release
        uses: ncipollo/release-action@v1.21.0
        with:
          allowUpdates: true
          draft: false
          makeLatest: true
          name: ${{ github.ref_name }}
          body: ${{ steps.git-cliff.outputs.content }}
          token: ${{ github.token }}

  binaries:
    name: Cross-OS binaries
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.26"

      - name: Build archives + checksums
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${target%/*}"; arch="${target#*/}"
            bin="svchealthcheck"; [ "$os" = "windows" ] && bin="svchealthcheck.exe"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -ldflags "-s -w" -o "dist/$bin" ./cmd/svchealthcheck
            name="couchbase-health-observer_${TAG}_${os}_${arch}"
            if [ "$os" = "windows" ]; then (cd dist && zip -q "${name}.zip" "$bin"); else (cd dist && tar czf "${name}.tar.gz" "$bin"); fi
            rm -f "dist/$bin"
          done
          (cd dist && sha256sum * > checksums.txt)

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "$TAG" dist/* --clobber
