name: Publish observer image

# Build the multi-arch observer image and push it to Docker Hub, gated on CI (ci.yml).
# Pushes to main publish dev tags (edge + sha-<sha>) but NOT latest; only a v* release tag
# gets the semver tags and latest. (Pull requests are covered by ci.yml directly.)
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  IMAGE: tayebchlyah/couchbase-health-observer

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          # main -> edge + sha-<sha> (dev). v* tag -> semver tags. latest=auto applies
          # `latest` only on a semver tag, never on a plain main push.
          tags: |
            type=edge,branch=main
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          flavor: |
            latest=auto

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
