name: Publish observer image

# Build the multi-arch observer image and push it to the GitHub Container Registry
# (ghcr.io), gated on CI (ci.yml). Pushes to main publish dev tags (edge + sha-<sha>) but
# NOT latest; only a v* release tag gets the semver tags and latest. Uses the automatic
# GITHUB_TOKEN (no external registry secrets). (Pull requests are covered by ci.yml.)
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # main -> edge + sha-<sha> (dev). v* tag -> semver tags. latest=auto applies
          # `latest` only on a semver tag, never on a plain main push.
          tags: |
            type=edge,branch=main
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          flavor: |
            latest=auto

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
