# Common values shared by both regions. Region-specific name, server topology, and
# bucket replicas live in region-a-values.yaml / region-b-values.yaml and are layered
# on top via `helm --values`.
couchbase-operator:
  install:
    couchbaseOperator: true
    admissionController: true
    couchbaseCluster: true
    syncGateway: false

  couchbaseOperator:
    scope: Role

  buckets:
    default: null
    observer:
      memoryQuota: 100Mi
      replicas: 1
      storageBackend: couchstore

  cluster:
    image: couchbase/server:8.0.1
    antiAffinity: false
    # Let the operator compute pod memory requests/limits from the service memory
    # quotas (+ overhead) so each node reserves only what it needs. CPU is pinned low
    # (defaults are 2/4 per pod, which would not fit 5+ nodes on a kind cluster).
    autoResourceAllocation:
      enabled: true
      cpuRequests: "0.25"
      cpuLimits: "1"
    security:
      username: Administrator
      password: password
    buckets:
      managed: true
    cluster:
      dataServiceMemoryQuota: 256Mi
      indexServiceMemoryQuota: 256Mi
      autoFailoverTimeout: 5s
      autoFailoverMaxCount: 1
