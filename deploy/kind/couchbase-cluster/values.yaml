couchbase-operator:
  install:
    couchbaseOperator: true
    admissionController: true
    couchbaseCluster: true
    syncGateway: false

  couchbaseOperator:
    scope: Role

  buckets:
    default: null
    observer:
      memoryQuota: 100Mi
      replicas: 1
      storageBackend: couchstore

  # region-a: the primary we exercise. 3 data nodes + 2 index/query nodes, bucket
  # replica 1, and a short auto-failover timeout so a single-node loss is absorbed
  # well inside the observer FailoverDelay (the "no switch on transient" path).
  cluster:
    name: region-a
    image: couchbase/server:8.0.1
    antiAffinity: false
    security:
      username: Administrator
      password: password
    buckets:
      managed: true
    cluster:
      dataServiceMemoryQuota: 256Mi
      indexServiceMemoryQuota: 256Mi
      autoFailoverTimeout: 5s
      autoFailoverMaxCount: 1
    servers:
      default: null
      data:
        size: 3
        services:
          - data
      query:
        size: 2
        services:
          - index
          - query
