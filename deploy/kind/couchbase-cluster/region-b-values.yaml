# region-b is only the failover target: a single data node, no index/query group,
# and no bucket replica (one node cannot host a replica). Overrides the region-a base.
couchbase-operator:
  buckets:
    observer:
      replicas: 0
  cluster:
    name: region-b
    servers:
      query: null
      data:
        size: 1
        services:
          - data
