# region-b: the failover target. A single data node, no index/query group, and no
# bucket replica (one node cannot host a replica). Layered on top of values.yaml.
couchbase-operator:
  buckets:
    observer:
      replicas: 0
  cluster:
    name: region-b
    servers:
      default: null
      data:
        size: 1
        services:
          - data
