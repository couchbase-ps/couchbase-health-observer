# Alerting rules for the centralized Observer. Requires the Prometheus Operator
# (PrometheusRule CRD). The dead-man switch is the concrete SPOF mitigation for
# the single-replica centralized model: if the observer disappears, you get paged.
#
# NOTE: ObserverAbsent uses up{job="observer"} — it assumes your Prometheus scrape
# names the job "observer" (annotation-based discovery via the Service/pod usually
# does). If your scrape config labels the job differently, adjust the job= selector.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: observer-alerts
  namespace: default
  labels:
    app: observer
    role: alert-rules
spec:
  groups:
    - name: observer
      rules:
        - alert: ObserverAbsent
          expr: up{job="observer"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Observer is absent (dead-man switch)"
            description: "No scrape of the observer for 1m — the single detector may be down."
        - alert: ObserverLoopStalled
          expr: time() - observer_loop_last_tick_timestamp_seconds > 30
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Observer active loop stalled"
            description: "No loop tick for >30s; liveness should restart it, alert if it persists."
        - alert: CouchbaseSustainedDown
          expr: observer_couchbase_up == 0
          for: 3m
          labels:
            severity: warning
          annotations:
            summary: "Primary Couchbase DOWN for 3m"
            description: "A region switch should have fired; check observer_failover_total."
        - alert: ObserverActuationErrors
          expr: increase(observer_failover_errors_total[5m]) > 0
          labels:
            severity: critical
          annotations:
            summary: "Observer actuation errors"
            description: "The observer failed to patch the ConfigMap or roll a deployment."
        - alert: ObserverSwitchHeldSecondaryDown
          expr: observer_secondary_up == 0 and observer_couchbase_up == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Failover held: secondary not ready while primary is down"
            description: "Both regions unhealthy — manual intervention required."
