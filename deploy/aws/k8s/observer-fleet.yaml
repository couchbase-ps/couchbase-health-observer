# The detector fleet for the distributed-quorum path: N replicas of the observer in
# OBSERVE mode, each independently watching the same primary Couchbase via its own SDK
# connection and serving /health/couchbase (200 UP / 503 DOWN). The AWS monitoring
# target group health-checks /health/couchbase across these pods; CloudWatch turns the
# unhealthy ratio into the quorum decision. This fleet never actuates a switch (that is
# the Lambda's job), so it needs no Kubernetes RBAC.
#
# Replace the image with your ECR image and --conn with the primary Couchbase endpoint
# (the cluster running on AWS VMs).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cb-observer-health
  namespace: default
  labels:
    app: cb-observer-health
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cb-observer-health
  template:
    metadata:
      labels:
        app: cb-observer-health
    spec:
      # Spread the detectors across AZs so the quorum reflects more than one failure
      # domain (a single-AZ blip should not look like a cluster-wide DOWN).
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: cb-observer-health
      containers:
        - name: observer
          image: couchbase-health-observer:dev # replace with your ECR image
          args:
            - --mode=observe
            - --conn=couchbase://PRIMARY_CB # replace: primary Couchbase (AWS VMs) connstring
            - --bucket=observer
            - --user=Administrator
            - --pass=password
            - --critical=kv
            - --addr=:8080
          ports:
            - containerPort: 8080
          # IMPORTANT: the Kubernetes probes use /healthz (static), NOT /health/couchbase.
          # The pod must stay Ready even when Couchbase is DOWN, otherwise Kubernetes would
          # remove it from the Service endpoints, the ALB target would deregister, and a
          # Couchbase-DOWN would be indistinguishable from a dead pod. Only the ALB target
          # group health-checks /health/couchbase to derive the quorum signal.
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cb-observer-health
  namespace: default
  labels:
    app: cb-observer-health
spec:
  selector:
    app: cb-observer-health
  ports:
    - name: http
      port: 8080
      targetPort: 8080
